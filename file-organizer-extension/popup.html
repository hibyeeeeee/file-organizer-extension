<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
  font-family: Arial;
  width: 300px;
  padding: 12px;
  background: #0f172a;
  color: white;
}

h3 {
  margin: 0 0 10px 0;
}

.card {
  background: #111827;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 10px;
}

/* ================= DROP ZONE ================= */

.drop-zone {
  border: 2px dashed #334155;
  padding: 14px;
  border-radius: 10px;
  text-align: center;
  font-size: 12px;
  color: #94a3b8;
  cursor: pointer;
  margin-bottom: 10px;
  transition: 0.2s ease;
}

.drop-zone.dragover {
  border-color: #3b82f6;
  background: rgba(59,130,246,0.1);
  color: white;
}

/* ================= BUTTONS ================= */

button {
  width: 100%;
  padding: 8px;
  margin-top: 6px;
  border-radius: 8px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.primary { background: #3b82f6; color: white; }
.secondary { background: #334155; color: white; }
.danger { background: #ef4444; color: white; }

/* ================= STATUS ================= */

.status {
  font-size: 12px;
  color: #94a3b8;
  margin-top: 8px;
}

.status.loading { color: #60a5fa; }
.status.success { color: #34d399; }
.status.error { color: #f87171; }

/* ================= PROGRESS ================= */

.progress {
  height: 4px;
  width: 0%;
  background: #3b82f6;
  border-radius: 10px;
  transition: 0.3s ease;
  margin-top: 8px;
}

/* ================= OUTPUT ================= */

pre {
  font-size: 11px;
  background: #0b1220;
  padding: 8px;
  border-radius: 8px;
  max-height: 140px;
  overflow: auto;
}

/* ================= HINT ================= */

.hint {
  font-size: 10px;
  color: #64748b;
  margin-top: 6px;
}
</style>

</head>

<body>

<h3>📁 File Organizer Pro</h3>

<div class="card">

  <!-- DROP ZONE -->
  <div id="dropZone" class="drop-zone">
    Drop folder here or click to select
    <input type="file" id="folderPicker" webkitdirectory hidden>
  </div>

  <div class="hint">
    Smart preview-based organization system
  </div>

  <!-- ACTIONS -->
  <button class="primary" id="organizeBtn">Preview Organize</button>
  <button class="secondary" id="statsBtn">Stats</button>
  <button class="danger" id="undoBtn">Undo</button>

  <!-- STATUS -->
  <div class="status" id="status">Idle</div>

  <!-- PROGRESS -->
  <div class="progress" id="progressBar"></div>

</div>

<!-- OUTPUT -->
<pre id="out">Ready.</pre>

<script src="popup.js"></script>
</body>
</html>
